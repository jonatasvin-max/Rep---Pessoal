<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>PWEB1 — Cap. 07 — AT05 — Mini Design System </title>
 <link rel="stylesheet" href="at05-style.css" />
</head>
<body>
 <header>
 <h1>Mini Design System </h1>
 <p><a href="https://jonatasvin-max.github.io/Rep---Pessoal/index.html">← Voltar para a página principal</a></p>
 </header>
 <main>
  <section class="hero">
      <h2 class="hero__titulo">Bem-vindo ao Design System</h2>
      <p class="hero__subtitulo">Construindo consistência visual</p>
      <button class="hero__cta btn btn--primario">Começar</button>
    </section>
  
  <section>
      <h2>Botões</h2>
      <button class="btn btn--primario">Ação principal</button>
      <button class="btn btn--secundario">Ação secundária</button>
      <button class="btn btn--perigo">Ação destrutiva</button>
      <button class="btn btn--primario" disabled>Desabilitado</button>
    </section>
  
  <section>
      <h2>Cartão</h2>
      <article class="card">
        <span class="card__badge">Destaque</span>
        <div class="card__imagem"></div>
        <div class="card__corpo">
          <h3 class="card__titulo">T_card</h3>
          <p class="card__texto">Desc_card</p>
          <a class="card__link" href="#">Saiba mais</a>
        </div>
      </article>
    </section>
  
  <section>
      <h2>Tabela de Tokens de Cor</h2>
      <table>
        <tr>
          <td style="background-color: var(--cor-primaria);"></td>
          <td>Primária</td>
          <td>#111111</td>
        </tr>
        <tr>
          <td style="background-color: var(--cor-secundaria);"></td>
          <td>Secundária</td>
          <td>#222222</td>
        </tr>
       <tr>
      <td style="background-color: var(--cor-destaque);"></td>
      <td>Destaque</td>
      <td>#ffffff</td>
    </tr>
    <tr>
      <td style="background-color: var(--cor-sucesso);"></td>
      <td>Sucesso</td>
      <td>#00ff88</td>
    </tr>
    <tr>
      <td style="background-color: var(--cor-erro);"></td>
      <td>Erro</td>
      <td>#ff4444</td>
    </tr>
      </table>
    </section>
  
  <section>
      <h2>Formulário</h2>
      <form class="form">
        <div class="form__grupo">
          <label class="form__label" for="nome">Nome</label>
          <input class="form__input" type="text" id="nome" required placeholder="Digite seu nome" />
        </div>
        <div class="form__grupo">
          <label class="form__label" for="email">Email</label>
          <input class="form__input" type="email" id="email" required placeholder="usuario@dominio.com" />
        </div>
        <div class="form__grupo">
          <label class="form__label" for="senha">Senha</label>
          <input class="form__input" type="password" id="senha" required />
        </div>
        <div class="form__grupo">
          <label class="form__label" for="mensagem">Mensagem</label>
          <textarea class="form__input" id="mensagem" placeholder="Digite sua mensagem"></textarea>
        </div>
        <button class="form__botao btn btn--primario" type="submit">Enviar</button>
      </form>
    </section>
  </main>
</body>
</html>
