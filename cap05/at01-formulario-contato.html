<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT01 — Formulário de Contato Simples</title>
</head>
<body>
 <header>
    <h1>Formulário de Contato Simples</h1>
    <p><a href="https://jonatasvin-max.github.io/Rep---Pessoal">← Voltar para a página principal</a></p>
  </header>
  <main>
    <section>
      <form action="https://httpbin.org/get" method="get">

          <label for="nome">Nome completo:</label>
          <input type="text" id="nome" name="nome" />

          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" placeholder="usuario@exemplo.com" />

          <label for="assunto">Assunto:</label>
          <input type="text" id="assunto" name="assunto" />

          <label for="mensagem">Mensagem:</label>
          <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite algo..."></textarea>

          <button type="submit">Enviar mensagem</button>
      </form>
    </section>
    </main>
</body>
</html>
